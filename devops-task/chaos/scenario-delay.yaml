apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
    name: hello-world-delay
    namespace: test-app
spec:
    hosts:
        - "hello-world.test-app.svc.cluster.local"
    http:
        - fault:
              delay:
                  percentage:
                      value: 50.0
                  fixedDelay: 3s
          route:
              - destination:
                    host: hello-world
                    port:
                        number: 80
